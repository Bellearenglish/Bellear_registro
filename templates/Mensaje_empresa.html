<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Informe generado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg border-0">
        <div class="card-body text-center">

            <h3 class="mb-3">✔ Informe generado correctamente</h3>

            <p class="text-muted">
                {{ mensaje }}
            </p>

            <div class="alert alert-secondary">
                <small>{{ ruta }}</small>
            </div>

            <div class="mt-4">
                <a href="/dashboard" class="btn btn-primary me-2">
                    Volver al panel
                </a>

                <button class="btn btn-outline-dark" onclick="abrirCarpeta()">
                    Abrir carpeta
                </button>
            </div>

        </div>
    </div>
</div>

<script>
function abrirCarpeta(){
    alert("La carpeta del informe se abrirá en el explorador de Windows.");
}
</script>

</body>
</html>
