<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Error del sistema</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}
.card-error{
    max-width:500px;
    margin:auto;
    margin-top:10vh;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}
.logo{
    width:120px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<div class="container">
<div class="card card-error text-center p-4">

{% if logo %}
<img src="{{ url_for('static', filename='logo.png') }}" class="logo">
{% endif %}

<h3 class="mb-3">{{ titulo }}</h3>

<p class="text-muted">{{ mensaje }}</p>

<button onclick="history.back()" class="btn btn-primary mt-3">
Volver
</button>

<a href="/dashboard" class="btn btn-outline-secondary mt-2">
Ir al inicio
</a>

</div>
</div>

</body>
</html>
